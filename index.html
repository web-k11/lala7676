<style>
body {
  min-height: 100vh;
  font-family: 'Noto Sans TC', sans-serif;
  position: relative;
  overflow-x: hidden;
}

  /* 背景顏色 */
body::before { 
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fcd9e7 0%, #fbcfe8 100%);

}
  
/* 背景漂浮元素 */
.floating-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.floating-item {
  position: absolute;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  animation: float 15s infinite ease-in-out;
}

.floating-heart {
  position: absolute;
  font-size: 1.2rem;
  opacity: 0.5;
  animation: float 20s infinite ease-in-out;
  color: rgba(249, 168, 212, 0.6);
  text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
}

@keyframes float {
  0%, 100% {
    transform: translateY(0) translateX(0) rotate(0deg);
  }
  25% {
    transform: translateY(-20px) translateX(10px) rotate(5deg);
  }
  50% {
    transform: translateY(-35px) translateX(-15px) rotate(-5deg);
  }
  75% {
    transform: translateY(-15px) translateX(15px) rotate(3deg);
  }
}

/* 搜尋框紫光效果 */
.search-glow {
  position: relative;
}

.search-glow::before {
  content: '';
  position: absolute;
  top: -3px;
  left: -3px;
  right: -3px;
  bottom: -3px;
  border-radius: 0.5rem;
  background: linear-gradient(45deg, rgba(249, 168, 212, 0), rgba(249, 168, 212, 0.5), rgba(249, 168, 212, 0));
  z-index: -1;
  animation: searchGlow 2s infinite alternate;
}

@keyframes searchGlow {
  0% {
    opacity: 0.3;
    background-position: 0% 50%;
  }
  100% {
    opacity: 0.6;
    background-position: 100% 50%;
  }
}

/* 標題特效 - 重新設計 - 紫灰漸層 */
.title-effect {
  letter-spacing: 0.15em;
  margin-left: 0.15em;
  text-align: center;
  background: linear-gradient(120deg, #f9a8d4, #f472b6);
  -webkit-background-clip: text;

  color: transparent;
  position: relative;

  text-shadow: 1px 2px 4px rgba(244, 114, 182, 0.2);
  animation: titleShimmer 3s infinite;
  font-weight: 800;
}

@keyframes titleShimmer {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

/* 標題光暈效果 - 更柔和 */
.title-effect::before {
  content: '';
  position: absolute;
  top: -10px;
  left: -10px;
  right: -10px;
  bottom: -10px;
  background: radial-gradient(circle at center, rgba(249, 168, 212, 0.15) 0%, rgba(249, 168, 212, 0) 70%);

  border-radius: 50%;

}

/* 確保副標題置中 */
.subtitle {
  width: 100%;
  text-align: center;
  display: block;
}

@keyframes spinner {
  to {
    transform: rotate(360deg);
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(-2px);
  }
  50% {

  }
}

@keyframes wobble {

  }

  }
}

.empty-icon {
  font-size: 4rem;
  animation: wobble 2s ease-in-out infinite;
  display: inline-block;
}

.line-clamp-1 {
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.line-clamp-2 {
  display: -webkit-box;

  -webkit-box-orient: vertical;

}

.song-card {
  transition: all 0.3s ease;
  transform: translateZ(0);

}

.song-card:hover {

}

.back-to-top {

  right: 1.5rem;

  border-radius: 9999px;
  background-color: #ec4899;

  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

}

.back-to-top.hidden {

.toast-notification {

.toast-notification.hidden {

.loading-spinner {

/* 清除所有按鈕樣式 */
.clear-button {

}

.clear-button.disabled {

/* 搜尋框清除按鈕 */
.search-clear-button {

<script>
// 全局變量
let allSongs = [];
let filteredSongs = [];
let languages = new Set();
let categories = new Set();
let categoryCounts = {};
let categoryOrder = {};
let selectedCategories = new Set();
let currentLanguageFilter = 'all';

// DOM 元素
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const categoryFilter = document.getElementById('category-filter');
const activeFilters = document.getElementById('active-filters');
const selectedCategoriesContainer = document.getElementById('selected-categories');
const languageFilter = document.getElementById('language-filter');
const songCount = document.getElementById('song-count');
const loading = document.getElementById('loading');
const error = document.getElementById('error');
const retryButton = document.getElementById('retry-button');
const emptyState = document.getElementById('empty-state');
const songsGrid = document.getElementById('songs-grid');
const backToTop = document.getElementById('back-to-top');
const clearCategoriesButton = document.getElementById('clear-categories');
const toastNotification = document.getElementById('toast-notification');
const floatingBg = document.getElementById('floating-bg');

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  createFloatingElements();
  fetchSheetData();
  setupEventListeners();
});

// 創建漂浮元素
function createFloatingElements() {
  const numElements = 15;
  const numHearts = 10; // 增加漂浮愛心的數量
  
  // 創建基本圓形元素
  for (let i = 0; i < numElements; i++) {
    const element = document.createElement('div');
    const size = Math.random() * 20 + 5; // 5px to 25px
    const left = Math.random() * 100; // 0% to 100%
    const top = Math.random() * 100; // 0% to 100%
    const delay = Math.random() * 5; // 0s to 5s
    const duration = Math.random() * 10 + 10; // 10s to 20s
    
    element.className = 'floating-item';
    element.style.width = `${size}px`;
    element.style.height = `${size}px`;
    element.style.left = `${left}%`;
    element.style.top = `${top}%`;
    element.style.animationDelay = `${delay}s`;
    element.style.animationDuration = `${duration}s`;
    element.style.opacity = Math.random() * 0.5 + 0.1; // 0.1 to 0.6
    
    floatingBg.appendChild(element);
  }
  
  // 創建愛心元素
  for (let i = 0; i < numHearts; i++) {
    const element = document.createElement('div');
    const left = Math.random() * 100; // 0% to 100%
    const top = Math.random() * 100; // 0% to 100%
    const delay = Math.random() * 5; // 0s to 5s
    const duration = Math.random() * 10 + 15; // 15s to 25s
    
    element.className = 'floating-heart';
    element.textContent = '♡';
    element.style.left = `${left}%`;
    element.style.top = `${top}%`;
    element.style.animationDelay = `${delay}s`;
    element.style.animationDuration = `${duration}s`;
    element.style.fontSize = `${Math.random() * 1 + 0.8}rem`;
    
    floatingBg.appendChild(element);
  }
}

// 設置事件監聽器
function setupEventListeners() {
  // 搜索框
  searchInput.addEventListener('input', () => {
    filterSongs();
    toggleSearchClearButton();
  });
  
  // 搜索框清除按鈕
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    filterSongs();
    toggleSearchClearButton();
    searchInput.focus();
  });

  // 清除分類按鈕
  clearCategoriesButton.addEventListener('click', () => {
    if (selectedCategories.size > 0) {
      selectedCategories.clear();
      updateSelectedCategoriesUI();
      filterSongs();
    }
  });

  // 回到頂部按鈕
  backToTop.addEventListener('click', () => {
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  });

  // 監聽滾動事件
  window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
      backToTop.classList.remove('hidden');
    } else {
      backToTop.classList.add('hidden');
    }
  });

  // 重試按鈕
  retryButton.addEventListener('click', fetchSheetData);
}

// 切換搜索框清除按鈕顯示狀態
function toggleSearchClearButton() {
  if (searchInput.value.trim() !== '') {
    searchClear.classList.remove('hidden');
  } else {
    searchClear.classList.add('hidden');
  }
}

// --- 智慧更新設定 ---
let lastUpdateTimestamp = 0; // 記錄上次成功的更新時間
const UPDATE_COOLDOWN = 2 * 60 * 1000; // 2 分鐘 (毫秒)

// 獲取試算表數據 (新增 isSilent 參數，判斷是否為背景靜默更新)
async function fetchSheetData(isSilent = false) {
  // 如果不是靜默更新，才顯示讀取中動畫
  if (!isSilent) {
    showLoading();
    hideError();
  }

  try {
  // 試算表ID
    const dataSourceConfig = {
      sheetId: '1sLi8ap9scV_iKPb_IiGLmP7kpKBk6lbyincsliUNYws',
      apiKey: 'AIzaSyDFU1PsOmEKCZfnJkCi5-1kVMi6yk5aDtE',
      targetRange: 'Sheet1',
      enableDataProxy: true
    };
    
    const proxyEndpoint = 'https://script.google.com/macros/s/AKfycbw-MnACC1oJuQ8DOjKUjwbZIFzUIMeyFsPvb8XHZ6PVFRQQPzkTVDmvpXwy7vX7yYdSxQ/exec';
    const targetUrl = `${proxyEndpoint}?t=${new Date().getTime()}`;

    const response = await fetch(targetUrl);
    if (!response.ok) throw new Error('Network response was not ok');

    const data = await response.json();
    
    // 更新成功，紀錄時間
    lastUpdateTimestamp = Date.now();
    console.log(`[DataService] ${isSilent ? '背景更新' : '初次載入'}成功: ${new Date().toLocaleTimeString()}`);

    // 1. 處理標題與頁面設定
    if (data.titleData && data.titleData.length > 0) {
      const titleObject = data.titleData[0];
      if (titleObject['分頁']) document.title = titleObject['分頁'];
      const mainTitleElement = document.querySelector('.title-effect');
      if (mainTitleElement) mainTitleElement.textContent = titleObject['大標題'] || '';
      const subtitleElement = document.querySelector('.subtitle');
      if (subtitleElement) subtitleElement.textContent = titleObject['副標題'] || '';
      

      localStorage.setItem(CACHE_KEY_TITLE, JSON.stringify(data.titleData));
    }

    // 2. 處理內容資料 (自動覆蓋舊資料)
    if (data.sheet1Data) {
      processSheetData(data.sheet1Data);


      localStorage.setItem(CACHE_KEY_SONGS, JSON.stringify(data.sheet1Data));
    }

    hideLoading();
  } catch (err) {
    console.error('[DataService] Sync failed:', err);
    // 只有在非靜默狀態下才顯示錯誤訊息
    if (!isSilent) {
      hideLoading();
      showError();
    }
  }
}

// 偵測是否需要更新的邏輯
function checkForUpdate() {
  const now = Date.now();
  // 如果從未更新過，或距離上次更新超過 2 分鐘
  if (lastUpdateTimestamp !== 0 && (now - lastUpdateTimestamp > UPDATE_COOLDOWN)) {
    console.log("[AutoSync] 偵測到活動且冷卻結束，啟動背景更新...");
    fetchSheetData(true); // 傳入 true，代表靜默更新，不轉圈圈
  }
}

// 監聽行為：使用者滑動網頁時
window.addEventListener('scroll', () => {
  checkForUpdate();
}, { passive: true });


// 處理試算表數據
function processSheetData(data) {
  // 重置數據
  allSongs = [];
  languages = new Set();
  categories = new Set();
  categoryCounts = {};
  categoryOrder = {};
  selectedCategories.clear();

  // 首先處理 F 欄的「分類項目」來獲取分類順序
  data.forEach((row) => {
    const categoryItem = row.分類項目 || row['分類項目'] || row.CategoryItem || '';
    if (categoryItem && categoryOrder[categoryItem] === undefined) {
      categoryOrder[categoryItem] = Object.keys(categoryOrder).length;
      categories.add(categoryItem);
    }
  });

  // 處理歌曲數據
  allSongs = data.map((row, index) => {
    const song = {
      id: index + 1,
      title: row.歌名 || row.title || row.Song || '',
      artist: row.歌手 || row.artist || row.Artist || '',
      language: row.語言 || row.language || row.Language || '',
      category: row.分類 || row.category || row.Category || '',
      notes: row.備註 || row.notes || row.Notes || '',
      categories: []
    };

    if (song.language) {
      languages.add(song.language);
    }

    if (song.category) {
      const categoryList = song.category.split(',').map(cat => cat.trim());
      song.categories = categoryList;

      categoryList.forEach(cat => {
        if (cat) {
          categories.add(cat);
          categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;

          // 如果這個分類還沒有順序（不在 F 欄中），給它一個較大的順序值
          if (categoryOrder[cat] === undefined) {
            categoryOrder[cat] = 1000 + Object.keys(categoryOrder).length;
          }
        }
      });
    }

    return song;
  });

  filteredSongs = [...allSongs];
  updateUI();
}

// 過濾歌曲
function filterSongs() {
  const searchTerm = searchInput.value.toLowerCase();
  
  filteredSongs = allSongs.filter(song => {
    // 語言過濾
    if (currentLanguageFilter !== 'all' && song.language !== currentLanguageFilter) {
      return false;
    }

    // 分類過濾
    if (selectedCategories.size > 0) {
      for (const category of selectedCategories) {
        if (!song.categories.includes(category)) {
          return false;
        }
      }
    }

    // 搜索過濾
    if (searchTerm) {
      return (
        (song.title && song.title.toLowerCase().includes(searchTerm)) ||
        (song.artist && song.artist.toLowerCase().includes(searchTerm)) ||
        (song.language && song.language.toLowerCase().includes(searchTerm)) ||
        (song.category && song.category.toLowerCase().includes(searchTerm)) ||
        (song.notes && song.notes.toLowerCase().includes(searchTerm))
      );
    }

    return true;
  });

  updateCategoryCounts();
  updateSongsUI();
}

// 更新分類計數
function updateCategoryCounts() {
  const newCounts = {};

  filteredSongs.forEach(song => {
    if (song.categories && song.categories.length > 0) {
      song.categories.forEach(cat => {
        if (cat) {
          newCounts[cat] = (newCounts[cat] || 0) + 1;
        }
      });
    }
  });

  categoryCounts = newCounts;
  updateCategoryFilterUI();
}

// 更新 UI
function updateUI() {
  updateLanguageFilterUI();
  updateCategoryFilterUI();
  updateSongsUI();
  updateSelectedCategoriesUI();
  updateClearButtonState();
  toggleSearchClearButton();
}

// 更新清除按鈕狀態
function updateClearButtonState() {
  if (selectedCategories.size > 0) {
    clearCategoriesButton.classList.remove('disabled');
  } else {
    clearCategoriesButton.classList.add('disabled');
  }
}

// 更新語言過濾器 UI
function updateLanguageFilterUI() {
  languageFilter.innerHTML = '';

  // 不添加"全部"按鈕，直接添加語言按鈕
  Array.from(languages).sort().forEach(language => {
    const button = document.createElement('button');
    button.className = `px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium text-xs sm:text-sm transition-colors ${
      currentLanguageFilter === language ? 'bg-pink-600 text-white hover:bg-pink-700' : ''
    }`;
    button.textContent = language;
    button.addEventListener('click', () => {
      if (currentLanguageFilter === language) {
        // 如果點擊當前選中的語言，則切換回"全部"
        currentLanguageFilter = 'all';
      } else {
        currentLanguageFilter = language;
      }
      updateLanguageFilterUI();
      filterSongs();
    });
    languageFilter.appendChild(button);
  });
}

// 更新分類過濾器 UI
function updateCategoryFilterUI() {
  categoryFilter.innerHTML = '';

  // 按照原始順序排序分類
  const sortedCategories = Array.from(categories).sort((a, b) => {
    const orderA = categoryOrder[a] !== undefined ? categoryOrder[a] : Number.MAX_SAFE_INTEGER;
    const orderB = categoryOrder[b] !== undefined ? categoryOrder[b] : Number.MAX_SAFE_INTEGER;
    return orderA - orderB;
  });

  sortedCategories.forEach(category => {
    const button = document.createElement('button');
    button.className = `px-3 py-1.5 rounded-lg bg-pink-100 hover:bg-pink-200 text-pink-700 font-medium flex items-center text-base transition-all duration-200 ${
      selectedCategories.has(category)
        ? 'bg-pink-500 text-gray-100 hover:bg-pink-600 -translate-y-1 shadow-md'
        : ''
    }`;
    
    const span = document.createElement('span');
    span.className = 'line-clamp-1';
    span.textContent = category;
    button.appendChild(span);

    const count = document.createElement('span');
    count.className = `ml-1.5 inline-flex items-center justify-center min-w-[20px] h-5 px-1 rounded-full text-xs font-semibold ${
      selectedCategories.has(category) ? 'bg-white/30 text-white' : 'bg-pink-200 text-pink-800'
    }`;
    count.textContent = categoryCounts[category] || 0;
    button.appendChild(count);

    button.addEventListener('click', () => {
      toggleCategory(category);
    });

    categoryFilter.appendChild(button);
  });
}

// 更新已選擇的分類 UI
function updateSelectedCategoriesUI() {
  selectedCategoriesContainer.innerHTML = '';

  if (selectedCategories.size > 0) {
    Array.from(selectedCategories).forEach(category => {
      const tag = document.createElement('div');
      tag.className = 'filter-tag bg-pink-200 text-pink-800 cursor-pointer text-xs px-2 py-1 rounded-full flex items-center mr-2 mb-1 border-0';
      
      const span = document.createElement('span');
      span.textContent = category;
      tag.appendChild(span);

      const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      icon.setAttribute('class', 'h-3 w-3 ml-1');
      icon.setAttribute('fill', 'none');
      icon.setAttribute('viewBox', '0 0 24 24');
      icon.setAttribute('stroke', 'currentColor');
      
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('d', 'M6 18L18 6M6 6l12 12');
      
      icon.appendChild(path);
      tag.appendChild(icon);

      tag.addEventListener('click', () => {
        toggleCategory(category);
      });

      selectedCategoriesContainer.appendChild(tag);
    });
  } else {
    const emptyText = document.createElement('span');
    emptyText.className = 'text-gray-400 text-xs';
    emptyText.textContent = '尚未選擇任何分類';
    selectedCategoriesContainer.appendChild(emptyText);
  }
  
  updateClearButtonState();
}

// 更新歌曲 UI
function updateSongsUI() {
  songCount.textContent = filteredSongs.length;
  songsGrid.innerHTML = '';

  if (filteredSongs.length === 0) {
    emptyState.classList.remove('hidden');
    songsGrid.classList.add('hidden');
  } else {
    emptyState.classList.add('hidden');
    songsGrid.classList.remove('hidden');

    filteredSongs.forEach(song => {
      const card = createSongCard(song);
      songsGrid.appendChild(card);
    });
  }
}

// 創建歌曲卡片
function createSongCard(song) {
  const card = document.createElement('div');
  card.className = `song-card bg-white rounded-lg shadow p-2.5 border-l-4 ${getLanguageColor(song.language)} hover:border-pink-500 relative transition-all duration-300 hover:-translate-y-1 hover:shadow-md`;

  // 標題
  const title = document.createElement('h3');
  title.className = 'text-lg font-bold text-gray-800 pr-1 line-clamp-1';
  title.textContent = song.title || '';
  card.appendChild(title);

  // 歌手和語言
  const artistLangContainer = document.createElement('div');
  artistLangContainer.className = 'flex flex-wrap justify-between items-center mt-1 gap-1';

  const artist = document.createElement('p');
  artist.className = 'text-xs sm:text-sm text-gray-600 line-clamp-1 mr-1';
  artist.textContent = song.artist || '';
  artistLangContainer.appendChild(artist);

  if (song.language) {
    const language = document.createElement('span');
    language.className = `language-tag px-1.5 py-0.5 text-xs rounded-full ${getLanguageClass(song.language)} whitespace-nowrap`;
    language.textContent = song.language;
    artistLangContainer.appendChild(language);
  }

  card.appendChild(artistLangContainer);

  // 分類標籤
  if (song.categories && song.categories.length > 0) {
    const categoriesContainer = document.createElement('div');
    categoriesContainer.className = 'mt-1 flex flex-wrap';

    song.categories.forEach(category => {
      if (category) {
        const tag = document.createElement('span');
        tag.className = `inline-block px-1 py-0.5 text-xs rounded-full mr-1 mb-0.5 cursor-pointer ${
          selectedCategories.has(category)
            ? 'bg-pink-200 text-pink-800 font-medium'
            : 'bg-pink-100 text-pink-800'
        }`;
        tag.textContent = category;
        tag.addEventListener('click', () => {
          toggleCategory(category);
        });
        categoriesContainer.appendChild(tag);
      }
    });

    card.appendChild(categoriesContainer);
  }

  // 備註
  if (song.notes) {
    const notes = document.createElement('p');
    notes.className = 'mt-1 text-xs text-gray-500 line-clamp-2';
    
    const noteLabel = document.createElement('span');
    noteLabel.className = 'font-medium';
    noteLabel.textContent = '備註: ';
    notes.appendChild(noteLabel);
    
    notes.appendChild(document.createTextNode(song.notes));
    card.appendChild(notes);
  }

  // 複製按鈕
  const copyButtonContainer = document.createElement('div');
  copyButtonContainer.className = 'absolute top-8 right-3';

  const copyButton = document.createElement('button');
  copyButton.className = 'p-2 bg-cream-100 hover:bg-cream-200 text-[#BEBEBE] rounded-full focus:outline-none shadow-md transition-all duration-200 hover:-translate-y-1 active:scale-95';

  const copyIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  copyIcon.setAttribute('class', 'h-8 w-8');
  copyIcon.setAttribute('fill', 'none');
  copyIcon.setAttribute('viewBox', '0 0 24 24');
  copyIcon.setAttribute('stroke', 'currentColor');
  
  const copyPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  copyPath.setAttribute('stroke-linecap', 'round');
  copyPath.setAttribute('stroke-linejoin', 'round');
  copyPath.setAttribute('stroke-width', '2');
  copyPath.setAttribute('d', 'M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z');
  
  copyIcon.appendChild(copyPath);
  copyButton.appendChild(copyIcon);

  copyButton.addEventListener('click', () => {
    const textToCopy = `${song.artist} - ${song.title}`.trim();
    copyToClipboard(textToCopy);
  });

  copyButtonContainer.appendChild(copyButton);
  card.appendChild(copyButtonContainer);

  return card;
}

// 切換分類選擇
function toggleCategory(category) {
  if (selectedCategories.has(category)) {
    selectedCategories.delete(category);
  } else {
    selectedCategories.add(category);
  }
  
  updateSelectedCategoriesUI();
  updateCategoryFilterUI();
  filterSongs();
}

// 複製到剪貼簿
function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => {
        showToast();
      })
      .catch(err => {
        console.error('Failed to copy: ', err);
      });
  } else {
    // 回退方案
    const textArea = document.createElement('textarea');
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    
    try {
      document.execCommand('copy');
      showToast();
    } catch (err) {
      console.error('Fallback: Copy command failed', err);
    }
    
    document.body.removeChild(textArea);
  }
}

// 顯示通知
function showToast() {
  toastNotification.classList.remove('hidden');
  setTimeout(() => {
    toastNotification.classList.add('hidden');
  }, 2000);
}

// 顯示加載中
function showLoading() {
  loading.classList.remove('hidden');
  songsGrid.classList.add('hidden');
  emptyState.classList.add('hidden');
  error.classList.add('hidden');
}

// 隱藏加載中
function hideLoading() {
  loading.classList.add('hidden');
  songsGrid.classList.remove('hidden');
}

// 顯示錯誤
function showError() {
  error.classList.remove('hidden');
  songsGrid.classList.add('hidden');
  emptyState.classList.add('hidden');
}

// 隱藏錯誤
function hideError() {
  error.classList.add('hidden');
}

// 獲取語言顏色
function getLanguageColor(language) {
  if (!language) return 'border-gray-500';

  const colors = [
    'border-pink-500',
    'border-rose-500',
    'border-pink-400',
    'border-rose-400',
    'border-pink-600',
    'border-rose-600',
    'border-pink-300',
    'border-rose-300',
    'border-pink-700',
  ];

  let hash = 0;
  for (let i = 0; i < language.length; i++) {
    hash = language.charCodeAt(i) + ((hash << 5) - hash);
  }

  const index = Math.abs(hash) % colors.length;
  return colors[index];
}

// 獲取語言類別
function getLanguageClass(language) {
  if (!language) return 'bg-gray-100 text-gray-800';

  const classes = [
    'bg-pink-100 text-pink-800',
    'bg-rose-100 text-rose-800',
    'bg-pink-200 text-pink-800',
    'bg-rose-200 text-rose-800',
    'bg-pink-100 text-pink-700',
    'bg-rose-100 text-rose-700',
    'bg-pink-200 text-pink-700',
    'bg-rose-200 text-rose-700',
    'bg-pink-100 text-pink-900',
  ];

  let hash = 0;
  for (let i = 0; i < language.length; i++) {
    hash = language.charCodeAt(i) + ((hash << 5) - hash);
  }

  const index = Math.abs(hash) % classes.length;
  return classes[index];
}
